version: 2
updates:
  # Elixir / Hex
  - package-ecosystem: "mix"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      hex-deps:
        update-types: ["minor", "patch"]
    commit-message:
      prefix: "chore(hex)"

  # Dockerfile
  - package-ecosystem: "docker"
    directories: ["/", ".devcontainer/"]
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    groups:
      docker-images:
        update-types: ["minor", "patch"]
    commit-message:
      prefix: "chore(docker)"

  # docker-compose.yaml
  - package-ecosystem: "docker-compose"
    directories: ["/", ".devcontainer/"]
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    groups:
      compose-images:
        update-types: ["minor", "patch"]
    commit-message:
      prefix: "chore(compose)"

  # Dev Containers (.devcontainer/**)
  - package-ecosystem: "devcontainers"
    directory: ".devcontainer/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    groups:
      devcontainer-features:
        update-types: ["minor", "patch"]
    commit-message:
      prefix: "chore(devcont)"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      github-actions:
        update-types: ["minor", "patch"]
    commit-message:
      prefix: "chore(ci)"

  # Bun (package.json + bun.lock)
  - package-ecosystem: "bun"
    directory: "/assets"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      js-deps:
        update-types: ["minor", "patch"]
    commit-message:
      prefix: "chore(bun)"

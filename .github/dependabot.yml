version: 2
updates:
  # Elixir / Hex
  - package-ecosystem: "mix"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      hex-patch:
        update-types: ["patch"]
      hex-minor:
        update-types: ["minor"]
      hex-major:
        update-types: ["major"]
    commit-message:
      prefix: "chore(hex)"

  # Dockerfile
  - package-ecosystem: "docker"
    directories: ["/", ".devcontainer/"]
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 4
    groups:
      docker-patch:
        update-types: ["patch"]
      docker-minor:
        update-types: ["minor"]
      docker-major:
        update-types: ["major"]
    commit-message:
      prefix: "chore(docker)"

  # docker-compose.yaml
  - package-ecosystem: "docker-compose"
    directories: ["/", ".devcontainer/"]
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 4
    groups:
      compose-patch:
        update-types: ["patch"]
      compose-minor:
        update-types: ["minor"]
      compose-major:
        update-types: ["major"]
    commit-message:
      prefix: "chore(compose)"

  # Dev Containers (.devcontainer/**)
  - package-ecosystem: "devcontainers"
    directory: ".devcontainer/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    groups:
      devcontainer-patch:
        update-types: ["patch"]
      devcontainer-minor:
        update-types: ["minor"]
      devcontainer-major:
        update-types: ["major"]
    commit-message:
      prefix: "chore(devcont)"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      github-actions-patch:
        update-types: ["patch"]
      github-actions-minor:
        update-types: ["minor"]
      github-actions-major:
        update-types: ["major"]
    commit-message:
      prefix: "chore(ci)"

  # Bun (package.json + bun.lock)
  - package-ecosystem: "bun"
    directory: "/assets"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      js-patch:
        update-types: ["patch"]
      js-minor:
        update-types: ["minor"]
      js-major:
        update-types: ["major"]
    commit-message:
      prefix: "chore(bun)"

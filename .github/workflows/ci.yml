name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

env:
  MIX_ENV: test

jobs:
  static:
    name: Static checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: prefix-dev/setup-pixi@v0.9.5
        with:
          cache: true
          pixi-version: v0.68.0

      - name: Cache deps
        uses: actions/cache@v5
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Cache build
        uses: actions/cache@v5
        with:
          path: _build
          key: ${{ runner.os }}-build-${{ hashFiles('pixi.lock', '**/mix.lock') }}
          restore-keys: ${{ runner.os }}-build-

      - name: Install deps
        run: pixi run mix deps.get

      - name: Compile (warnings as errors)
        run: pixi run mix compile --warnings-as-errors

      - name: Check formatting
        run: pixi run mix format --check-formatted

      - name: Credo
        run: pixi run mix credo

  sobelow:
    name: Sobelow security scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: prefix-dev/setup-pixi@v0.9.5
        with:
          cache: true
          pixi-version: v0.68.0

      - name: Cache deps
        uses: actions/cache@v5
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Cache build
        uses: actions/cache@v5
        with:
          path: _build
          key: ${{ runner.os }}-build-${{ hashFiles('pixi.lock', '**/mix.lock') }}
          restore-keys: ${{ runner.os }}-build-

      - name: Install deps
        run: pixi run mix deps.get

      - name: Compile
        run: pixi run mix compile

      - name: Run Sobelow
        run: pixi run mix sobelow --skip --ignore Config.HTTPS,Config.CSP --exit Low

  dialyzer:
    name: Dialyzer type check
    runs-on: ubuntu-latest

    env:
      MIX_ENV: dev

    steps:
      - uses: actions/checkout@v6

      - uses: prefix-dev/setup-pixi@v0.9.5
        with:
          cache: true
          pixi-version: v0.68.0

      - name: Cache deps
        uses: actions/cache@v5
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Cache build
        uses: actions/cache@v5
        with:
          path: _build
          key: ${{ runner.os }}-build-${{ hashFiles('pixi.lock', '**/mix.lock') }}
          restore-keys: ${{ runner.os }}-build-

      - name: Cache PLT
        uses: actions/cache@v5
        with:
          path: priv/plts
          key: ${{ runner.os }}-plt-${{ hashFiles('pixi.lock', '**/mix.lock') }}
          restore-keys: ${{ runner.os }}-plt-

      - name: Install deps
        run: pixi run mix deps.get

      - name: Compile
        run: pixi run mix compile

      - name: Run Dialyzer
        run: pixi run mix dialyzer

  trivy:
    name: Trivy vulnerability scan
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v6

      - name: Run Trivy (filesystem)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

  tests:
    name: Elixir tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: prefix-dev/setup-pixi@v0.9.0
        with:
          cache: true

      - name: Cache deps
        uses: actions/cache@v5
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Cache build
        uses: actions/cache@v5
        with:
          path: _build
          key: ${{ runner.os }}-build-${{ hashFiles('pixi.lock', '**/mix.lock') }}
          restore-keys: ${{ runner.os }}-build-

      - name: Install deps
        run: pixi run mix deps.get

      - name: Run tests
        run: pixi run mix test

  browser:
    name: Browser tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: prefix-dev/setup-pixi@v0.9.0
        with:
          cache: true

      - name: Cache deps
        uses: actions/cache@v5
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Cache build
        uses: actions/cache@v5
        with:
          path: _build
          key: ${{ runner.os }}-build-${{ hashFiles('pixi.lock', '**/mix.lock') }}
          restore-keys: ${{ runner.os }}-build-

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('assets/bun.lock') }}
          restore-keys: ${{ runner.os }}-playwright-

      - name: Install Bun deps
        working-directory: assets
        run: pixi run bun install --frozen-lockfile

      - name: Install deps
        run: pixi run mix deps.get

      - name: Build assets
        run: pixi run mix assets.build

      - name: Install Playwright browser
        working-directory: assets
        run: pixi run bun run playwright install --with-deps chromium

      - name: Run browser tests
        working-directory: assets
        run: pixi run bun run test:e2e

      - name: Upload Playwright report
        if: ${{ failure() }}
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: assets/playwright-report/
          if-no-files-found: ignore
